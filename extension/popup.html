<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <style>
      :root {
        --bg: #0b1220;
        --panel: #111a2b;
        --panel-2: #0f172a;
        --text: #e5e7eb;
        --muted: #94a3b8;
        --accent: #38bdf8;
        --ok: #22c55e;
        --border: #1f2937;
      }
      body {
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        width: 420px;
        margin: 0;
        padding: 12px;
        color: var(--text);
        background: var(--bg);
      }
      .head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 10px;
      }
      h3 { margin: 0; font-size: 16px; }
      #status { font-size: 12px; color: var(--muted); }
      .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
      button {
        padding: 9px 10px;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: var(--panel);
        color: var(--text);
        cursor: pointer;
        font-size: 13px;
      }
      button:hover { border-color: var(--accent); }
      pre {
        white-space: pre-wrap;
        max-height: 360px;
        overflow: auto;
        background: var(--panel-2);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 10px;
        margin: 0;
        font-size: 12px;
        line-height: 1.4;
      }
    </style>
  </head>
  <body>
    <div class="head">
      <h3>datad extension</h3>
      <div id="status">Ready</div>
    </div>
    <div class="actions">
      <button id="extract">Extract from current tab</button>
      <button id="exportCsvs">Export all sections CSV</button>
    </div>
    <pre id="out">Run extract to preview data…</pre>
    <script type="module" src="popup.js"></script>
  </body>
</html>
